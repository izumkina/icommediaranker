    if(!universe||candidates.length===0)return null;
    const target=mode==="budget"?null:(targetPct/100)*universe;
    return optimize({candidates,aud,universe,mode,budget:budget*1e6,target,nFreq,strength,ov:{}});
  },[universe,candidates,mode,budget,targetPct,nFreq,strength,aud]);

  // plan-level frequency distribution (indicative): treat plan as one buy at avg freq
  const freqBars=useMemo(()=>{
    if(!result||result.total1<=0)return [];
    const af=result.totalImpr/result.total1;
    // blend retention by format share of impressions
    const bShare=result.alloc.filter(a=>a.fmt==="banner").reduce((s,a)=>s+a.impr,0)/Math.max(result.totalImpr,1);
    const vShare=1-bShare;
    return [1,2,3,4,5].map(n=>{const ret=bShare*retention("banner",af,n)+vShare*retention("video",af,n);return {n:n+"+",reach:result.total1*ret};});
  },[result]);

  const frontierData=useMemo(()=>{
    if(!result)return [];
    return result.frontier.filter((_,i)=>i%2===0).map(f=>({spend:f.spend/1e6,reach:universe?f.reach/universe*100:f.reach/1e6,mcpr:Math.min(f.mcpr,20)}));
  },[result,universe]);

  const band=MODEL.band.banner;
  const accumData=useMemo(()=>{
    if(!result)return [];
    return result.frontier.filter((_,i)=>i%2===0).map(f=>{const r=universe?f.reach/universe*100:f.reach/1e6;return {spend:f.spend/1e6,reach:r,range:[r*band.p25,r*band.p75]};});
  },[result,universe]);

  const incData=result?result.alloc.slice(0,8).map(a=>({name:niceName(a.site),incr:universe?a.incN/universe*100:a.incN/1e6,fmt:a.fmt})):[];

  const objLabel={budget:"под бюджет",reach1plus:"под охват 1+",reachfreq:`под охват ${nFreq}+`}[mode];

  return (
    <div style={{fontFamily:"ui-sans-serif,system-ui,Arial",color:C.ink,background:"#eef1f5",minHeight:"100vh"}}>
      <div style={{background:C.navy,color:"#fff",padding:"14px 22px",display:"flex",alignItems:"baseline",gap:14}}>
        <div style={{fontSize:18,fontWeight:700,letterSpacing:0.3}}>Медиапланировщик</div>
        <div style={{fontSize:12,color:"#9fb4cd"}}>планирование охвата по площадкам и форматам · дедупликация · оптимизация сплита</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:0,alignItems:"start"}}>
        {/* CONTROL RAIL */}
        <div style={{background:"#fff",borderRight:`1px solid ${C.grid}`,padding:18,minHeight:"100vh"}}>
          <Section title="Аудитория">
            <select value={aud} onChange={e=>setAud(e.target.value)} style={selStyle}>
              {["All18+","All25-45","All35-55","W25-45","M25-45","W25-65","M35-55","W35-55","W18-35"].map(a=>
                <option key={a} value={a}>{a}{MODEL.universes[a]?"":"  (нет вселенной)"}</option>)}
            </select>
            {!hasU&&<Hint>Для этой группы нет вселенной — расчёт в абсолютах, без % и целей по охвату.</Hint>}
          </Section>

          <Section title="Формат">
            <Seg options={[["mix","Микс"],["banner","Только баннер"],["video","Только видео"]]} value={fmtFilter} onChange={setFmtFilter}/>
          </Section>

          <Section title="Цель">
            <Seg options={[["budget","Бюджет"],["reach1plus","Охват 1+"],["reachfreq","Охват N+"]]} value={mode} onChange={setMode} disabled={!hasU&&true} disabledKeys={hasU?[]:["reach1plus","reachfreq"]}/>
            <div style={{marginTop:10}}>
              {mode==="budget"&&<NumberField label="Бюджет, млн ₽" value={budget} onChange={setBudget} step={5}/>}
              {mode==="reach1plus"&&hasU&&<NumberField label="Целевой охват 1+, % аудитории" value={targetPct} onChange={setTargetPct} step={5} max={90}/>}
              {mode==="reachfreq"&&hasU&&<>
                <NumberField label={`Целевой охват ${nFreq}+, % аудитории`} value={targetPct} onChange={setTargetPct} step={5} max={90}/>
                <div style={{marginTop:8}}><label style={lblStyle}>Целевая частота N+</label>
                  <Seg options={[["2","2+"],["3","3+"],["4","4+"],["5","5+"]]} value={String(nFreq)} onChange={v=>setNFreq(+v)}/></div>
              </>}
            </div>
          </Section>

          <Section title="CPM (редактируется)">
            <div style={{display:"flex",gap:10}}>
              <NumberField label="Баннер, ₽" value={cpmB} onChange={setCpmB} step={10} small/>
              <NumberField label="Видео, ₽" value={cpmV} onChange={setCpmV} step={10} small/>
            </div>
          </Section>

          <Section title={`Сила пересечений: ${strength.toFixed(2)}`}>
            <input type="range" min="0" max="1.6" step="0.05" value={strength} onChange={e=>setStrength(+e.target.value)} style={{width:"100%"}}/>
            <Hint>0 = площадки независимы (Sainsbury). Выше — сильнее родство аудиторий, больше пересечение на глубине.</Hint>
          </Section>

          <Section title={`Площадки-кандидаты (${candidates.length})`}>
            <Hint>Топ-20 по потолку охвата для выбранных аудитории и формата. Оптимизатор сам распределяет бюджет; профинансированные — в плане справа.</Hint>
          </Section>
        </div>

        {/* RESULTS */}
        <div style={{padding:"18px 22px"}}>
          {!result&&<div style={{padding:40,color:C.muted}}>Нет данных для выбранной комбинации. Измените аудиторию или формат.</div>}
          {result&&<>
            <div style={{display:"flex",gap:12,flexWrap:"wrap",marginBottom:16}}>
              <Kpi label={`Охват 1+`} value={fmtM(result.total1)} sub={universe?`${(result.total1/universe*100).toFixed(1)}% ауд`:""} accent/>
              {mode==="reachfreq"&&<Kpi label={`Охват ${nFreq}+`} value={fmtM(result.totalN)} sub={universe?`${(result.totalN/universe*100).toFixed(1)}% ауд`:""}/>}
              <Kpi label="Бюджет" value={fmtRub(result.spend)}/>
              <Kpi label="Показы" value={fmtM(result.totalImpr)}/>
              <Kpi label="Ср. частота" value={(result.totalImpr/Math.max(result.total1,1)).toFixed(1)}/>
              <Kpi label="CPR (1+)" value={(result.spend/Math.max(result.total1,1)).toFixed(2)+" ₽"}/>
            </div>

            <Panel title={`Кривая накопления охвата ${objLabel}`} note="заштриховано — вероятный коридор P25–P75">
              <ResponsiveContainer width="100%" height={230}>
                <ComposedChart data={accumData} margin={{top:8,right:14,left:0,bottom:4}}>
                  <CartesianGrid stroke={C.grid}/>
                  <XAxis dataKey="spend" tick={{fontSize:11,fill:C.muted}} tickFormatter={v=>v.toFixed(0)} label={{value:"Бюджет, млн ₽",position:"insideBottom",offset:-2,fontSize:11,fill:C.muted}}/>
                  <YAxis tick={{fontSize:11,fill:C.muted}} tickFormatter={v=>v.toFixed(0)+(universe?"%":"M")}/>
                  <Tooltip formatter={(v,n)=>[typeof v==="number"?v.toFixed(1)+(universe?"%":"M"):v, n==="reach"?"охват":n]} labelFormatter={l=>`${(+l).toFixed(0)} млн ₽`}/>
                  <Area dataKey="range" stroke="none" fill={C.band} fillOpacity={0.14}/>
                  <Line dataKey="reach" stroke={C.navy} strokeWidth={2.4} dot={false}/>
                </ComposedChart>
              </ResponsiveContainer>
            </Panel>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginTop:14}}>
              <Panel title="Incremental reach по площадкам">
                <ResponsiveContainer width="100%" height={210}>
                  <BarChart data={incData} margin={{top:4,right:10,left:0,bottom:4}}>
                    <CartesianGrid stroke={C.grid} vertical={false}/>
                    <XAxis dataKey="name" tick={{fontSize:10,fill:C.muted}} interval={0} angle={-25} textAnchor="end" height={50}/>
                    <YAxis tick={{fontSize:11,fill:C.muted}} tickFormatter={v=>v.toFixed(0)+(universe?"%":"M")}/>
                    <Tooltip formatter={v=>[v.toFixed(1)+(universe?"%":"M"),"incremental"]}/>
                    <Bar dataKey="incr">{incData.map((d,i)=><Cell key={i} fill={d.fmt==="video"?C.video:C.navy2}/>)}</Bar>
                  </BarChart>
                </ResponsiveContainer>
              </Panel>
              <Panel title="Распределение по частоте (1+…5+)" note="индикативно: план как единая закупка на средней частоте">
                <ResponsiveContainer width="100%" height={210}>
                  <BarChart data={freqBars} margin={{top:4,right:10,left:0,bottom:4}}>
                    <CartesianGrid stroke={C.grid} vertical={false}/>
                    <XAxis dataKey="n" tick={{fontSize:11,fill:C.muted}}/>
                    <YAxis tick={{fontSize:11,fill:C.muted}} tickFormatter={v=>fmtM(v)}/>
                    <Tooltip formatter={v=>[fmtM(v),"охват"]}/>
                    <Bar dataKey="reach" fill={C.orange}/>
                  </BarChart>
                </ResponsiveContainer>
              </Panel>
            </div>

            <Panel title="Кривая эффективности (предельный CPR)" note="где рубль перестаёт окупаться" style={{marginTop:14}}>
              <ResponsiveContainer width="100%" height={190}>
                <LineChart data={frontierData} margin={{top:8,right:14,left:0,bottom:4}}>
                  <CartesianGrid stroke={C.grid}/>
                  <XAxis dataKey="spend" tick={{fontSize:11,fill:C.muted}} tickFormatter={v=>v.toFixed(0)} label={{value:"Бюджет, млн ₽",position:"insideBottom",offset:-2,fontSize:11,fill:C.muted}}/>
                  <YAxis tick={{fontSize:11,fill:C.muted}} tickFormatter={v=>v.toFixed(0)+"₽"}/>
                  <Tooltip formatter={v=>[v.toFixed(2)+" ₽/чел","предельный CPR"]} labelFormatter={l=>`${(+l).toFixed(0)} млн ₽`}/>
                  <Line dataKey="mcpr" stroke="#C0392B" strokeWidth={2.2} dot={false}/>
                </LineChart>
              </ResponsiveContainer>
            </Panel>

            <Panel title="Медиаплан" style={{marginTop:14}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12.5}}>
                <thead><tr style={{color:C.muted,textAlign:"left",borderBottom:`1px solid ${C.grid}`}}>
                  <th style={th}>Площадка</th><th style={th}>Формат</th><th style={thR}>CPM</th><th style={thR}>Бюджет</th><th style={thR}>Показы</th><th style={thR}>Охват</th><th style={thR}>Частота</th><th style={thR}>Incremental</th></tr></thead>
                <tbody>
                  {result.alloc.map((a,i)=><tr key={i} style={{borderBottom:`1px solid ${C.light}`}}>
                    <td style={td}>{niceName(a.site)}</td>
                    <td style={td}><span style={{fontSize:11,padding:"1px 7px",borderRadius:9,background:a.fmt==="video"?"#e7f3ec":"#e9eef5",color:a.fmt==="video"?C.video:C.navy2}}>{a.fmt==="video"?"видео":"баннер"}</span></td>
                    <td style={tdR}>{a.cpm} ₽</td><td style={tdR}>{fmtRub(a.money)}</td><td style={tdR}>{fmtM(a.impr)}</td>
                    <td style={tdR}>{fmtM(a.reach1)}</td><td style={tdR}>{a.freq.toFixed(1)}</td><td style={{...tdR,fontWeight:600,color:C.navy}}>{fmtM(a.incN)}</td>
                  </tr>)}
                </tbody>
              </table>
            </Panel>
            <div style={{fontSize:11,color:C.muted,marginTop:10,lineHeight:1.5}}>
              Дедупликация — модель «общего ядра» (сила пересечений {strength.toFixed(2)}). Прогноз охвата калиброван, коридор P25–P75 индикативен на уровне плана. Кросс-площадочное накопление частоты — будущее уточнение.
            </div>
          </>}
        </div>
      </div>
    </div>
  );
}

const selStyle={width:"100%",padding:"8px 10px",border:"1px solid #d4dae2",borderRadius:8,fontSize:13,background:"#fff",color:"#1f2a36"};
const lblStyle={fontSize:11,color:"#8a94a3",display:"block",marginBottom:4};
const th={padding:"7px 8px",fontWeight:600};const thR={...th,textAlign:"right"};
const td={padding:"7px 8px"};const tdR={...td,textAlign:"right",fontVariantNumeric:"tabular-nums"};

function Section({title,children}){return <div style={{marginBottom:18}}><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.6,color:"#1d3a5c",marginBottom:8}}>{title}</div>{children}</div>;}
function Hint({children}){return <div style={{fontSize:11,color:"#8a94a3",marginTop:6,lineHeight:1.45}}>{children}</div>;}
function Seg({options,value,onChange,disabledKeys=[]}){return <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{options.map(([k,l])=>{const dis=disabledKeys.includes(k);return <button key={k} disabled={dis} onClick={()=>!dis&&onChange(k)} style={{flex:"1 0 auto",padding:"7px 9px",fontSize:12,borderRadius:7,cursor:dis?"not-allowed":"pointer",border:`1px solid ${value===k?"#1d3a5c":"#d4dae2"}`,background:value===k?"#1d3a5c":(dis?"#f3f4f6":"#fff"),color:value===k?"#fff":(dis?"#bcc3cc":"#1f2a36"),fontWeight:value===k?600:400}}>{l}</button>;})}</div>;}
function NumberField({label,value,onChange,step=1,max,small}){return <div style={{flex:1}}><label style={lblStyle}>{label}</label><input type="number" value={value} step={step} max={max} onChange={e=>onChange(Math.max(0,max?Math.min(max,+e.target.value):+e.target.value))} style={{...selStyle,padding:small?"7px 8px":"8px 10px"}}/></div>;}
function Kpi({label,value,sub,accent}){return <div style={{background:"#fff",border:`1px solid ${accent?"#f0d2b4":"#e6e9ee"}`,borderRadius:10,padding:"11px 15px",minWidth:118,borderTop:accent?`3px solid ${C.orange}`:`3px solid ${C.navy}`}}><div style={{fontSize:11,color:"#8a94a3"}}>{label}</div><div style={{fontSize:21,fontWeight:700,color:C.navy,fontVariantNumeric:"tabular-nums"}}>{value}</div>{sub&&<div style={{fontSize:11,color:"#8a94a3"}}>{sub}</div>}</div>;}
function Panel({title,note,children,style}){return <div style={{background:"#fff",border:`1px solid ${C.grid}`,borderRadius:12,padding:"13px 15px",...style}}><div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:8}}><div style={{fontSize:13,fontWeight:700,color:C.navy}}>{title}</div>{note&&<div style={{fontSize:10.5,color:"#a4adb8"}}>{note}</div>}</div>{children}</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
